name: Build macOS plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --branch 8.0.4 --depth 1 https://github.com/juce-framework/JUCE.git ../JUCE

      - name: Configure
        run: cmake -B build -G Xcode

      - name: Build
        run: cmake --build build --config Release

      - name: Show gebouwde bestanden
        run: find build -iname "*.vst3" -o -iname "*.component"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: HardwareEQNotepad-VST3
          path: build/**/*.vst3
          if-no-files-found: error

      - name: Upload Audio Unit (AU)
        uses: actions/upload-artifact@v4
        with:
          name: HardwareEQNotepad-AU
          path: build/**/*.component
          if-no-files-found: error
